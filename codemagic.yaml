workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Create Android project structure
        script: |
          flutter create . --platforms=android --org=com.mohit
          mkdir -p android/app
          cp google-services.json android/app/
      - name: Configure Android Gradle for Firebase
        script: |
          # 1. Project-level build.gradle में google-services classpath जोड़ना
          sed -i '' 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.0"/' android/build.gradle
          
          # 2. App-level build.gradle के सबसे नीचे plugin अप्लाई करना
          echo 'apply plugin: "com.google.gms.google-services"' >> android/app/build.gradle
          
          # 3. MinSdkVersion को बढ़ाकर 21 करना (Firestore के लिए ज़रूरी)
          sed -i '' 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
